{% extends "base.html" %}
{% block content %}
  <div class="card center-card">
    <h2>Dashboard</h2>

    <form method="post">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" value="{{ user['username'] }}" readonly>
      </div>

      <div class="form-group">
        <label>Age</label>
        <input type="number" name="age" value="{{ user['age'] or '' }}">
      </div>

      <div class="form-group">
        <label>Height (cm)</label>
        <input type="number" name="height" value="{{ user['height'] or '' }}">
      </div>

      <div class="form-group">
        <label>Weight (kg)</label>
        <input type="number" name="weight" value="{{ user['weight'] or '' }}">
      </div>

      <div class="form-group">
        <label>Goal</label>
        <select name="goal">
          <option value="">-- Select --</option>
          <option value="weight_loss" {% if user['goal']=='weight_loss' %}selected{% endif %}>Weight Loss</option>
          <option value="weight_gain" {% if user['goal']=='weight_gain' %}selected{% endif %}>Weight Gain</option>
        </select>
      </div>

      <div class="row" style="margin-top: 16px;">
        <button class="btn-primary" type="submit">Update Profile</button>
        <a class="btn-min" href="{{ url_for('choice') }}">Back</a>
      </div>
    </form>
  </div>
{% endblock %}
